name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve iPhone simulator
        id: simulator
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import subprocess
          import sys

          data = json.loads(subprocess.check_output([
              "xcrun", "simctl", "list", "devices", "available", "-j"
          ]))

          for runtime, devices in sorted(data["devices"].items(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for device in devices:
                  if device["name"].startswith("iPhone"):
                      print(f"name={device['name']}")
                      sys.exit(0)

          raise SystemExit("No available iPhone simulator found")
          PY

      - name: Build and run unit tests
        run: |
          xcodebuild test \
            -project ObdJeep.xcodeproj \
            -scheme ObdJeep \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO
